openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Smart Lost & Found Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: items
    description: Lost and found item operations
  - name: claims
    description: Ownership claim operations
  - name: users
    description: User profile operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List items with optional filters
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [lost, found]
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [open, claimed, resolved]
        - name: search
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemList"
    post:
      operationId: createItem
      tags: [items]
      summary: Report a lost or found item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/stats:
    get:
      operationId: getItemStats
      tags: [items]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemStats"

  /items/recent:
    get:
      operationId: getRecentItems
      tags: [items]
      summary: Get recently reported items
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get a single item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /claims:
    get:
      operationId: listClaims
      tags: [claims]
      summary: List claims (admin sees all, user sees own)
      parameters:
        - name: itemId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Claim"
    post:
      operationId: createClaim
      tags: [claims]
      summary: Submit an ownership claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimInput"
      responses:
        "201":
          description: Created claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"

  /claims/{id}:
    get:
      operationId: getClaim
      tags: [claims]
      summary: Get a single claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Claim detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"
    patch:
      operationId: updateClaim
      tags: [claims]
      summary: Update claim status (admin approve/reject)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimUpdate"
      responses:
        "200":
          description: Updated claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /users/{userId}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /storage/upload-url:
    post:
      operationId: getUploadUrl
      tags: [items]
      summary: Get a presigned URL for image upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Item:
      type: object
      required: [id, title, type, category, status, userId, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [lost, found]
        category:
          type: string
        location:
          type: ["string", "null"]
        dateLostFound:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, claimed, resolved]
        userId:
          type: string
        userName:
          type: ["string", "null"]
        userEmail:
          type: ["string", "null"]
        claimCount:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ItemInput:
      type: object
      required: [title, description, type, category, imageUrl]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 10
        type:
          type: string
          enum: [lost, found]
        category:
          type: string
        location:
          type: string
        dateLostFound:
          type: string
        imageUrl:
          type: string
          format: uri

    ItemUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        category:
          type: string
        location:
          type: string
        dateLostFound:
          type: string
        imageUrl:
          type: string
        status:
          type: string
          enum: [open, claimed, resolved]

    ItemList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ItemStats:
      type: object
      required: [totalLost, totalFound, totalResolved, totalOpen, totalClaimed, recentCount]
      properties:
        totalLost:
          type: integer
        totalFound:
          type: integer
        totalResolved:
          type: integer
        totalOpen:
          type: integer
        totalClaimed:
          type: integer
        recentCount:
          type: integer
        categoryCounts:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    Claim:
      type: object
      required: [id, itemId, userId, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        itemId:
          type: integer
        itemTitle:
          type: ["string", "null"]
        userId:
          type: string
        userName:
          type: ["string", "null"]
        userEmail:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        proofImageUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNote:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ClaimInput:
      type: object
      required: [itemId]
      properties:
        itemId:
          type: integer
        description:
          type: string
        proofImageUrl:
          type: string

    ClaimUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNote:
          type: string

    UserProfile:
      type: object
      required: [id, clerkUserId, email, role, createdAt]
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        studentId:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        name:
          type: string
        studentId:
          type: string
        phone:
          type: string

    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [user, admin]

    UploadUrlRequest:
      type: object
      required: [filename, contentType]
      properties:
        filename:
          type: string
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadUrl, objectUrl]
      properties:
        uploadUrl:
          type: string
        objectUrl:
          type: string
